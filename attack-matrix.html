<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug Bounty Attack Matrix</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
:root{--bg:#080c10;--surface:#0d1117;--surface2:#161b22;--surface3:#1c2128;--border:#21262d;--accent:#00ff88;--accent2:#00b8ff;--accent3:#ff4d6d;--accent4:#ffbe0b;--text:#c9d1d9;--text-dim:#6e7681;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.012) 2px,rgba(0,255,136,0.012) 4px);pointer-events:none;z-index:900;}

/* HEADER */
header{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;background:rgba(8,12,16,0.95);backdrop-filter:blur(10px);}
header h1{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent);letter-spacing:3px;white-space:nowrap;}
header .tagline{font-size:12px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;letter-spacing:1px;white-space:nowrap;}
.search-wrap{margin-left:auto;position:relative;width:300px;}
.search-wrap .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px;pointer-events:none;line-height:1;}
#search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 32px 8px 32px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:0.5px;outline:none;transition:border-color .15s,box-shadow .15s;}
#search-input::placeholder{color:var(--text-dim);}
#search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,255,136,0.08);}
#search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;display:none;}
#search-clear:hover{color:var(--text);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 57px);}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.section-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-dim);padding:12px 18px 5px;text-transform:uppercase;}
.stack-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 18px;background:none;border:none;cursor:pointer;text-align:left;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.5px;transition:all .15s;border-left:2px solid transparent;}
.stack-btn:hover{background:rgba(255,255,255,0.04);color:#fff;}
.stack-btn.active{background:rgba(0,255,136,0.07);border-left-color:var(--accent);color:var(--accent);}
.stack-btn .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.stack-btn .count{margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);background:var(--surface2);padding:2px 6px;border-radius:10px;}
.stack-btn.active .count{background:rgba(0,255,136,0.15);color:var(--accent);}

/* MAIN */
.main{overflow-y:auto;padding:24px 32px;}
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text-dim);}
.welcome .icon{font-size:44px;filter:grayscale(.5);}
.welcome p{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;}

/* STACK HEADER */
.stack-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.stack-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.stack-header h2{font-size:24px;font-weight:700;letter-spacing:1px;color:#fff;}
.stack-header .subtitle{font-size:12px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;margin-top:2px;}
.total-val{margin-left:auto;text-align:right;}
.total-val .label{font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--text-dim);letter-spacing:1px;}
.total-val .amount{font-size:20px;font-weight:700;color:var(--accent4);font-family:'Share Tech Mono',monospace;}

/* FILTER */
.filter-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--text-dim);letter-spacing:1px;}
.filter-btn{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;letter-spacing:0.5px;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,255,136,0.06);}
.divider{width:1px;height:18px;background:var(--border);margin:0 2px;}

/* CATEGORIES */
.category{margin-bottom:20px;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cat-header h3{font-size:11px;font-family:'Share Tech Mono',monospace;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
.cat-header .line{flex:1;height:1px;background:var(--border);}
.vectors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;}

/* VECTOR CARDS */
.vector-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;}
.vector-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0;}
.vector-card:hover{border-color:rgba(255,255,255,0.15);background:var(--surface2);transform:translateX(2px);}
.vector-card:hover .vec-name{color:#fff;}
.vector-card .vec-info{flex:1;min-width:0;}
.vector-card .vec-name{font-size:14px;font-weight:600;color:#e6edf3;line-height:1.3;}
.vector-card .vec-note{font-size:11px;color:var(--text-dim);margin-top:3px;font-family:'Share Tech Mono',monospace;}
.vector-card .vec-bounty{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.vector-card .notes-badge{position:absolute;bottom:8px;right:10px;font-size:9px;font-family:'Share Tech Mono',monospace;color:var(--text-dim);letter-spacing:1px;opacity:0;transition:opacity .15s;}
.vector-card:hover .notes-badge{opacity:1;}

/* TIERS */
.tier-critical::before{background:var(--red);}
.tier-critical .vec-bounty{color:var(--red);}
.tier-high::before{background:#ff7b2c;}
.tier-high .vec-bounty{color:#ff7b2c;}
.tier-medium::before{background:var(--yellow);}
.tier-medium .vec-bounty{color:var(--yellow);}
.tier-low::before{background:var(--green);}
.tier-low .vec-bounty{color:var(--green);}
.tier-info::before{background:var(--accent2);}
.tier-info .vec-bounty{color:var(--accent2);}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(3px);}
.modal-overlay.open{opacity:1;pointer-events:all;}

/* NOTES PANEL (right slide-over) */
.notes-panel{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:95vw;background:var(--surface);border-left:1px solid var(--border);z-index:600;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow:hidden;display:flex;flex-direction:column;}
.notes-panel.open{transform:translateX(0);}
.notes-panel-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.notes-panel-header .np-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.notes-panel-header .np-tier-bar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px;}
.np-title{font-size:20px;font-weight:700;color:#fff;line-height:1.2;flex:1;}
.np-bounty{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700;white-space:nowrap;}
.np-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.np-cat-badge{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;}
.np-stack-badge{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:2px 8px;border-radius:4px;border:1px solid;font-weight:600;}
.np-close{margin-left:auto;background:none;border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.np-close:hover{border-color:var(--text);color:var(--text);}

/* NOTES BODY */
.notes-body{overflow-y:auto;flex:1;padding:20px 24px;}
.notes-body::-webkit-scrollbar{width:3px;}
.notes-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.note-section{margin-bottom:22px;}
.note-section-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.note-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.note-text{font-size:14px;color:var(--text);line-height:1.65;font-weight:400;}
.note-text b{color:#e6edf3;font-weight:700;}
.payload-list{display:flex;flex-direction:column;gap:5px;}
.payload-item{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:'Share Tech Mono',monospace;font-size:11px;color:#e6edf3;line-height:1.5;white-space:pre-wrap;word-break:break-all;cursor:pointer;transition:all .15s;position:relative;}
.payload-item:hover{border-color:rgba(0,255,136,0.3);color:var(--accent);}
.payload-item .copy-hint{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--text-dim);opacity:0;transition:opacity .15s;}
.payload-item:hover .copy-hint{opacity:1;}
.payload-item.copied{border-color:var(--accent);background:rgba(0,255,136,0.05);}
.tip-list{display:flex;flex-direction:column;gap:6px;}
.tip-item{display:flex;gap:8px;font-size:13px;color:var(--text);line-height:1.5;}
.tip-item::before{content:'›';color:var(--accent);font-size:16px;line-height:1.3;flex-shrink:0;}
.tip-item b{color:#e6edf3;}
.ref-list{display:flex;flex-direction:column;gap:5px;}
.ref-item{display:flex;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent2);padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;text-decoration:none;transition:all .15s;cursor:default;}
.ref-item span{flex:1;}
.ref-item .ref-src{font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
.no-notes{text-align:center;padding:40px 20px;color:var(--text-dim);}
.no-notes p{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.tag{font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);color:var(--text-dim);background:var(--surface2);}

/* SEARCH RESULTS */
.search-results-header{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-dim);margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.search-results-header .query{color:var(--accent);}
.search-results-header .result-count{margin-left:auto;background:var(--surface2);padding:2px 10px;border-radius:10px;color:var(--text);}
.search-section{margin-bottom:24px;animation:fadeIn .2s ease;}
.search-section-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.stack-pill{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:0.5px;color:#e6edf3;cursor:pointer;padding:3px 10px 3px 8px;border-radius:20px;border:1px solid var(--border);background:var(--surface);transition:all .15s;}
.stack-pill:hover{border-color:rgba(255,255,255,0.2);background:var(--surface2);}
.stack-pill .sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sline{flex:1;height:1px;background:var(--border);}
.search-no-results{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 0;color:var(--text-dim);}
.search-no-results .nr-icon{font-size:36px;}
.search-no-results p{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;}
mark{background:rgba(0,255,136,0.18);color:var(--accent);border-radius:2px;padding:0 1px;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:8px 16px;border-radius:6px;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>

// Build stack-specific notes lookup
function getNote(stackId, vectorId){
  return NOTES[`${stackId}:${vectorId}`] || NOTES[`__generic:${vectorId}`] || null;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function tier(b){if(!b)return'tier-info';if(b>=1500)return'tier-critical';if(b>=700)return'tier-high';if(b>=300)return'tier-medium';return'tier-low';}
function tierColor(b){if(!b)return'var(--accent2)';if(b>=1500)return'var(--red)';if(b>=700)return'#ff7b2c';if(b>=300)return'var(--yellow)';return'var(--green)';}

// ─── SIDEBAR BUILD ────────────────────────────────────────────────────────────
const cats=["PHP / Ruby / Python","Java / .NET","JavaScript","CMS / APIs / Infra"];
const stackGroups=[["php-legacy","php-modern","rails","flask","django"],["java-struts","java-spring","dotnet"],["nodejs-ejs","nodejs-express","jquery-spa","angularjs"],["wordpress","graphql","nginx","aws"]];
const sidebar=document.getElementById('sidebar');
stackGroups.forEach((grp,gi)=>{
  const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent=cats[gi];sidebar.appendChild(lbl);
  grp.forEach(id=>{
    const s=stacks.find(x=>x.id===id);if(!s)return;
    const btn=document.createElement('button');btn.className='stack-btn';btn.dataset.id=s.id;
    btn.innerHTML=`<span class="dot" style="background:${s.color}"></span><span>${s.name}</span><span class="count">${s.vectors.length}</span>`;
    btn.addEventListener('click',()=>showStack(s.id));sidebar.appendChild(btn);
  });
});

// ─── SHOW STACK ───────────────────────────────────────────────────────────────
let currentStackId=null;
let activeFilter='all';
function showStack(id){
  currentStackId=id;
  document.querySelectorAll('.stack-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.stack-btn[data-id="${id}"]`).classList.add('active');
  activeFilter='all';
  const s=stacks.find(x=>x.id===id);
  const vecs=s.vectors.map(vid=>allVectors.find(v=>v.id===vid)).filter(Boolean);
  const totalBounty=vecs.reduce((a,v)=>a+(v.bounty||0),0);
  const cats_present=[...new Set(vecs.map(v=>v.cat))];
  const hasNote=v=>!!getNote(id,v.id);
  document.getElementById('main').innerHTML=`
    <div class="stack-header">
      <div class="stack-icon" style="background:${s.color}22;border:1px solid ${s.color}44">${s.icon}</div>
      <div><h2>${s.name}</h2><div class="subtitle">${s.desc}</div></div>
      <div class="total-val"><div class="label">MAX BOUNTY POOL</div><div class="amount">$${totalBounty.toLocaleString()}+</div></div>
    </div>
    <div class="filter-bar">
      <span class="filter-label">FILTER:</span>
      <button class="filter-btn active" onclick="applyFilter('all',this)">ALL (${vecs.length})</button>
      <div class="divider"></div>
      ${cats_present.map(c=>`<button class="filter-btn" onclick="applyFilter('${c.replace(/'/g,"\\'")}',this)">${c.toUpperCase()} (${vecs.filter(v=>v.cat===c).length})</button>`).join('')}
    </div>
    <div id="cats-container">
      ${cats_present.map(cat=>renderCat(cat,vecs.filter(v=>v.cat===cat),id)).join('')}
    </div>`;
}
function renderCat(cat,vecs,stackId){
  return`<div class="category" data-cat="${cat}"><div class="cat-header"><h3>${cat}</h3><div class="line"></div></div><div class="vectors-grid">${vecs.map(v=>{const hn=getNote(stackId,v.id);return`<div class="vector-card ${tier(v.bounty)}" onclick="openPanel('${stackId}','${v.id}')"><div class="vec-info"><div class="vec-name">${v.name}</div>${v.note?`<div class="vec-note">${v.note}</div>`:''}</div><div class="vec-bounty">${v.bounty?'$'+v.bounty:'—'}</div>${hn?'<span class="notes-badge">NOTES ›</span>':''}</div>`;}).join('')}</div></div>`;
}
function applyFilter(filter,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const c=document.getElementById('cats-container');if(!c)return;
  c.querySelectorAll('.category').forEach(el=>{el.style.display=(filter==='all'||el.dataset.cat===filter)?'':'none';});
}

// ─── NOTES PANEL ─────────────────────────────────────────────────────────────
// ─── SAFE TEXT RENDERER ──────────────────────────────────────────────────────
// Only allows <b> tags — everything else is plain text. Nothing executes.
function safeRenderText(str, container) {
  const parts = str.split(/(<b>[\s\S]*?<\/b>)/g);
  parts.forEach(part => {
    const m = part.match(/^<b>([\s\S]*?)<\/b>$/);
    if (m) {
      const b = document.createElement('b');
      b.textContent = m[1]; // textContent: no HTML parsing inside <b> either
      container.appendChild(b);
    } else {
      container.appendChild(document.createTextNode(part));
    }
  });
}

function makeSection(title) {
  const sec = document.createElement('div');
  sec.className = 'note-section';
  const t = document.createElement('div');
  t.className = 'note-section-title';
  t.textContent = title;
  sec.appendChild(t);
  return sec;
}

function openPanel(stackId, vectorId) {
  const v = allVectors.find(x => x.id === vectorId);
  const s = stacks.find(x => x.id === stackId);
  if (!v || !s) return;
  const note = getNote(stackId, vectorId);
  const color = tierColor(v.bounty);

  document.getElementById('np-tier-bar').style.background = color;
  document.getElementById('np-title').textContent = v.name;
  document.getElementById('np-bounty').textContent = v.bounty ? '$' + v.bounty : '—';
  document.getElementById('np-bounty').style.color = color;
  document.getElementById('np-cat').textContent = v.cat;
  const sb = document.getElementById('np-stack-badge');
  sb.textContent = s.icon + ' ' + s.name;
  sb.style.background = s.color + '22';
  sb.style.borderColor = s.color + '66';
  sb.style.color = s.color;

  const body = document.getElementById('notes-body');
  // Clear previous content safely
  while (body.firstChild) body.removeChild(body.firstChild);

  if (!note) {
    const wrap = document.createElement('div');
    wrap.className = 'no-notes';
    const p1 = document.createElement('p');
    p1.textContent = 'NO SPECIFIC NOTES FOR THIS COMBINATION';
    const p2 = document.createElement('p');
    p2.style.cssText = 'margin-top:8px;font-size:11px;';
    p2.textContent = 'General techniques apply — refer to PATT / HackTricks';
    wrap.appendChild(p1);
    wrap.appendChild(p2);
    body.appendChild(wrap);
  } else {

    // OVERVIEW — safeRenderText so <b> works but nothing executes
    if (note.overview) {
      const sec = makeSection('Overview');
      const txt = document.createElement('div');
      txt.className = 'note-text';
      safeRenderText(note.overview, txt);
      sec.appendChild(txt);
      body.appendChild(sec);
    }

    // PAYLOADS — 100% textContent, never innerHTML, never executes
    if (note.payloads && note.payloads.length) {
      const sec = makeSection('Payloads & Techniques');
      const list = document.createElement('div');
      list.className = 'payload-list';
      note.payloads.forEach(rawPayload => {
        const item = document.createElement('div');
        item.className = 'payload-item';
        // Store raw string in data attribute for copying
        item.dataset.raw = rawPayload;
        const code = document.createElement('code');
        code.style.cssText = 'font-family:inherit;white-space:pre-wrap;word-break:break-all;';
        // textContent = browser treats this as plain text, zero HTML parsing
        code.textContent = rawPayload;
        const hint = document.createElement('span');
        hint.className = 'copy-hint';
        hint.textContent = 'click to copy';
        item.appendChild(code);
        item.appendChild(hint);
        item.addEventListener('click', () => copyPayload(item));
        list.appendChild(item);
      });
      sec.appendChild(list);
      body.appendChild(sec);
    }

    // TIPS — safeRenderText, no raw innerHTML
    if (note.tips && note.tips.length) {
      const sec = makeSection('Tips & Techniques');
      const list = document.createElement('div');
      list.className = 'tip-list';
      note.tips.forEach(tip => {
        const item = document.createElement('div');
        item.className = 'tip-item';
        safeRenderText(tip, item);
        list.appendChild(item);
      });
      sec.appendChild(list);
      body.appendChild(sec);
    }

    // TOOLS — plain textContent only
    if (note.tools && note.tools.length) {
      const sec = makeSection('Tools');
      const row = document.createElement('div');
      row.className = 'tag-row';
      note.tools.forEach(tool => {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = tool;
        row.appendChild(tag);
      });
      sec.appendChild(row);
      body.appendChild(sec);
    }

    // REFS — plain textContent only
    if (note.refs && note.refs.length) {
      const sec = makeSection('References');
      const list = document.createElement('div');
      list.className = 'ref-list';
      note.refs.forEach(r => {
        const item = document.createElement('div');
        item.className = 'ref-item';
        const label = document.createElement('span');
        label.textContent = r.label;
        const src = document.createElement('span');
        src.className = 'ref-src';
        src.textContent = r.src;
        item.appendChild(label);
        item.appendChild(src);
        list.appendChild(item);
      });
      sec.appendChild(list);
      body.appendChild(sec);
    }
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('notes-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('notes-panel').classList.remove('open');
}

function copyPayload(el) {
  // Read from data attribute — never from innerHTML
  const txt = el.dataset.raw || '';
  navigator.clipboard.writeText(txt).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 1200);
    showToast();
  }).catch(() => {
    // Fallback for non-https
    const ta = document.createElement('textarea');
    ta.value = txt;
    ta.style.cssText = 'position:fixed;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  });
}
function showToast(){
  const t=document.getElementById('toast');t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
const si=document.getElementById('search-input');
const sc=document.getElementById('search-clear');
si.addEventListener('input',()=>{
  const q=si.value.trim();
  sc.style.display=q?'block':'none';
  if(!q){restoreState();return;}
  runSearch(q);
});
sc.addEventListener('click',()=>{si.value='';sc.style.display='none';si.focus();restoreState();});
function restoreState(){
  const a=document.querySelector('.stack-btn.active');
  if(a)showStack(a.dataset.id);
  else document.getElementById('main').innerHTML=`<div class="welcome"><div class="icon">⬡</div><p>SELECT A TECH STACK TO VIEW ATTACK VECTORS</p></div>`;
}
// Escape HTML special chars — used anywhere user input touches innerHTML
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// hl() only wraps hardcoded source text (v.name, s.name etc.) in <mark>.
// User query q is only used as a regex pattern — it never appears in the output HTML.
function hl(text,q){if(!q)return text;const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');return text.replace(re,'<mark>$1</mark>');}

function runSearch(q){
  const ql=q.toLowerCase();
  document.querySelectorAll('.stack-btn').forEach(b=>b.classList.remove('active'));
  const stackMatches=stacks.filter(s=>s.name.toLowerCase().includes(ql)||s.desc.toLowerCase().includes(ql));
  const resultMap=new Map();
  stackMatches.forEach(s=>{
    resultMap.set(s.id,{stack:s,vecs:s.vectors.map(vid=>allVectors.find(v=>v.id===vid)).filter(Boolean),stackMatch:true});
  });
  stacks.forEach(s=>{
    const mv=s.vectors.map(vid=>allVectors.find(v=>v.id===vid)).filter(v=>v&&(v.name.toLowerCase().includes(ql)||v.cat.toLowerCase().includes(ql)||(v.note&&v.note.toLowerCase().includes(ql))));
    if(mv.length&&!resultMap.has(s.id))resultMap.set(s.id,{stack:s,vecs:mv,stackMatch:false});
  });
  const results=[...resultMap.values()];
  const total=results.reduce((a,r)=>a+r.vecs.length,0);
  const main=document.getElementById('main');

  if(!results.length){
    // Build no-results header safely — query set via textContent, not innerHTML
    main.innerHTML=`<div class="search-results-header"><span>RESULTS FOR</span><span class="query" id="q-display"></span><span class="result-count">0 results</span></div><div class="search-no-results"><div class="nr-icon">⊘</div><p>NO MATCHES FOUND</p></div>`;
    document.getElementById('q-display').textContent = '"' + q + '"';
    return;
  }

  // Build results HTML — all content comes from hardcoded stack/vector data (safe).
  // Query q only appears in: (1) the header label set via textContent below,
  // (2) hl() as a regex pattern — never in output HTML directly.
  main.innerHTML=`
    <div class="search-results-header"><span>RESULTS FOR</span><span class="query" id="q-display"></span><span class="result-count">${total} vector${total!==1?'s':''} across ${results.length} stack${results.length!==1?'s':''}</span></div>
    ${results.map(({stack:s,vecs,stackMatch})=>`
      <div class="search-section">
        <div class="search-section-header">
          <button class="stack-pill" onclick="clearSearchAndShow('${s.id}')"><span class="sdot" style="background:${s.color}"></span>${hl(s.name,stackMatch?q:'')}</button>
          <div class="sline"></div>
          <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim)">${vecs.length} vector${vecs.length!==1?'s':''}</span>
        </div>
        <div class="vectors-grid">
          ${vecs.map(v=>`<div class="vector-card ${tier(v.bounty)}" onclick="openPanel('${s.id}','${v.id}')">
            <div class="vec-info"><div class="vec-name">${hl(v.name,q)}</div>${v.note?`<div class="vec-note">${hl(v.note,q)}</div>`:''}<div class="vec-note" style="opacity:.5">${hl(v.cat,q)}</div></div>
            <div class="vec-bounty">${v.bounty?'$'+v.bounty:'—'}</div>
          </div>`).join('')}
        </div>
      </div>`).join('')}`;
  // Set query display safely via textContent — never via innerHTML
  const qDisplay = document.getElementById('q-display');
  if (qDisplay) qDisplay.textContent = '"' + q + '"';
}
function clearSearchAndShow(id){si.value='';sc.style.display='none';showStack(id);}

// close on Escape
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
</script>
